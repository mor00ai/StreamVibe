<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StreamVibe - Ad-Free Player</title>
    
    <!-- PWA Settings -->
    <meta name="theme-color" content="#121212">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192x192.png">
    <link rel="apple-touch-icon" href="./icons/icon-192x192.png">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <!-- Phosphor Icons per UI pulita e moderna -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <!-- Background Animato (Blur/Gradients) -->
    <div class="bg-gradient-1"></div>
    <div class="bg-gradient-2"></div>

    <div class="app-container">
        
        <!-- Header & Ricerca -->
        <header class="app-header">
            <h1>Stream<span>Vibe</span></h1>
            
            <div class="tabs">
                <button id="tabSearch" class="tab-btn active">Ricerca</button>
                <button id="tabPlaylists" class="tab-btn">Playlists</button>
            </div>

            <div class="search-bar-container" id="searchContainer">
                <i class="ph ph-magnifying-glass search-icon"></i>
                <input type="text" id="searchInput" placeholder="Cerca canzoni o artisti..." autocomplete="off">
                <button id="searchBtn" class="glass-btn"><i class="ph ph-arrow-right"></i></button>
            </div>
        </header>

        <!-- Area Contenuti Principale -->
        <main class="main-content">
            
            <!-- VISTA RICERCA -->
            <div id="searchView">
                <div id="loader" class="loader hidden">
                    <div class="spinner"></div>
                    <p>Ricerca in corso...</p>
                </div>

                <ul id="resultsList" class="results-list">
                    <div class="empty-state">
                        <i class="ph ph-music-notes-simple"></i>
                        <p>Cerca una canzone per iniziare ad ascoltare senza interruzioni.</p>
                    </div>
                </ul>
            </div>

            <!-- VISTA PLAYLISTS -->
            <div id="playlistsView" class="hidden">
                <div class="search-bar-container" style="margin-bottom: 20px;">
                    <i class="ph ph-folder-plus search-icon"></i>
                    <input type="text" id="newPlaylistInput" placeholder="Nome nuova playlist..." autocomplete="off">
                    <button id="createPlaylistBtn" class="glass-btn"><i class="ph ph-check"></i></button>
                </div>

                <ul id="playlistsList" class="results-list">
                    <div class="empty-state">
                        <i class="ph ph-books"></i>
                        <p>Non hai ancora creato nessuna playlist.</p>
                    </div>
                </ul>
            </div>

            <!-- VISTA SINGOLA PLAYLIST -->
            <div id="singlePlaylistView" class="hidden">
                <div style="display: flex; align-items: center; gap: 15px; margin-bottom: 20px;">
                    <button id="backToPlaylists" class="glass-btn" style="width: 40px; height: 40px; font-size: 1rem;"><i class="ph ph-arrow-left"></i></button>
                    <h2 id="singlePlaylistTitle">Playlist</h2>
                </div>
                <!-- Controls for Syncing info & Delete -->
                <div style="display: flex; flex-direction: column; gap: 10px; margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px solid var(--glass-border);">
                     <div style="display: flex; justify-content: space-between; align-items: center;">
                         <span style="font-size: 0.85rem; color: var(--text-secondary);" id="syncStatusText">🌍 Cloud Sync Attivo</span>
                         <div style="display: flex; gap: 10px;">
                             <button id="downloadCloudBtn" title="Forza scaricamento dal Cloud" style="background: transparent; border: none; color: white; cursor: pointer; font-size: 1.2rem;"><i class="ph ph-cloud-arrow-down"></i></button>
                             <button id="uploadCloudBtn" title="Forza salvataggio nel Cloud" style="background: transparent; border: none; color: white; cursor: pointer; font-size: 1.2rem;"><i class="ph ph-cloud-arrow-up"></i></button>
                         </div>
                     </div>
                     <div style="display: flex; gap: 10px; margin-top: 5px;">
                         <button id="deleteLocalBtn" class="glass-btn" style="border-radius: 8px; width: auto; height: 35px; flex: 1; font-size: 0.85rem; background: rgba(255, 42, 95, 0.2);">Elimina da Locale</button>
                         <button id="deleteCloudBtn" class="glass-btn" style="border-radius: 8px; width: auto; height: 35px; flex: 1; font-size: 0.85rem; background: rgba(138, 43, 226, 0.2);">Elimina da Cloud</button>
                     </div>
                </div>
                <ul id="singlePlaylistTracks" class="results-list"></ul>
            </div>
            
            <!-- MODAL PER AGGIUNTA BRANO -->
            <div id="playlistModal" class="playlist-modal-overlay hidden">
                <div class="playlist-modal">
                    <h3 style="margin-bottom:15px; text-align:center;">Aggiungi a...</h3>
                    <div id="modalPlaylistsContainer"></div>
                    <button id="closeModalBtn" class="modal-close-btn">Annulla</button>
                </div>
            </div>

        </main>

        <!-- Player Musicale Floating (Fisso in basso) -->
        <div class="player-bar glass-panel hidden" id="playerBar">
            
            <div class="progress-container" id="progressContainer">
                <div class="progress-bar" id="progressBar"></div>
            </div>

            <div class="player-controls-wrapper">
                
                <div class="track-info">
                    <img id="currentThumbnail" src="https://via.placeholder.com/60" alt="Cover" class="track-cover">
                    <div class="track-details">
                        <h4 id="currentTitle">Seleziona un brano</h4>
                        <p id="currentArtist">Autore</p>
                    </div>
                </div>

                <div class="main-controls">
                    <button class="control-btn" id="prevBtn"><i class="ph-fill ph-skip-back"></i></button>
                    <button class="control-btn play-pause-btn" id="playPauseBtn">
                        <i class="ph-fill ph-play" id="playIcon"></i>
                    </button>
                    <button class="control-btn" id="nextBtn"><i class="ph-fill ph-skip-forward"></i></button>
                </div>

                <div class="time-info">
                    <span id="currentTime">0:00</span> / <span id="totalTime">0:00</span>
                </div>
                
            </div>
            <!-- Audio Tag Nascosto -->
            <audio id="audioPlayer" preload="metadata"></audio>
        </div>

    </div>

    <script src="app.js"></script>
</body>
</html>
